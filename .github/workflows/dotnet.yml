name: .NET Desktop Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore winC2D.sln
    
    - name: Build
      run: dotnet build winC2D.sln --configuration Release --no-restore
    
    - name: Run Tests
      run: dotnet test winC2D.sln --configuration Release --no-build --verbosity normal

    # 便携版：单文件 exe，依赖系统已安装的 .NET 8 运行时
    - name: Publish Portable (framework-dependent)
      run: |
        dotnet publish winC2D.App/winC2D.App.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          --output ./publish-portable `
          /p:PublishSingleFile=true `
          /p:SelfContained=false `
          /p:IncludeNativeLibrariesForSelfExtract=false `
          /p:EnableCompressionInSingleFile=true

    # 自包含版：单文件 exe，内含 .NET 运行时，无需额外安装
    - name: Publish Self-Contained
      run: |
        dotnet publish winC2D.App/winC2D.App.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output ./publish-selfcontained `
          /p:PublishSingleFile=true `
          /p:SelfContained=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:EnableCompressionInSingleFile=true

    # 重命名产物，区分两个版本
    - name: Rename executables
      run: |
        Copy-Item ./publish-portable/winC2D.App.exe   ./winC2D-portable.exe
        Copy-Item ./publish-selfcontained/winC2D.App.exe ./winC2D.exe

    - name: Compute SHA-256
      run: |
        $portable = Get-FileHash ./winC2D-portable.exe -Algorithm SHA256
        $selfcontained = Get-FileHash ./winC2D.exe -Algorithm SHA256
        Write-Output "winC2D-portable.exe  SHA256: $($portable.Hash)"
        Write-Output "winC2D.exe           SHA256: $($selfcontained.Hash)"
        Write-Output "winC2D-portable.exe  Size:   $((Get-Item ./winC2D-portable.exe).Length) bytes"
        Write-Output "winC2D.exe           Size:   $((Get-Item ./winC2D.exe).Length) bytes"
        if ($portable.Hash -eq $selfcontained.Hash) {
          Write-Error "ERROR: Both files have identical SHA-256 — build configuration is wrong!"
          exit 1
        }

    - name: Upload Portable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: winC2D-portable
        path: ./winC2D-portable.exe
        retention-days: 7

    - name: Upload Self-Contained Artifact
      uses: actions/upload-artifact@v4
      with:
        name: winC2D-selfcontained
        path: ./winC2D.exe
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Download Portable Artifact
      uses: actions/download-artifact@v4
      with:
        name: winC2D-portable
        path: ./artifacts

    - name: Download Self-Contained Artifact
      uses: actions/download-artifact@v4
      with:
        name: winC2D-selfcontained
        path: ./artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "winC2D v${{ steps.version.outputs.VERSION }}"
        body: |
          ## winC2D v${{ steps.version.outputs.VERSION }}

          Windows disk migration assistant — move installed software and user folders from C drive to any disk, with symlinks keeping original paths intact.

          ### 📦 Downloads

          | File | Description |
          |------|-------------|
          | `winC2D-portable.exe` | **Portable** — requires [.NET 8 Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) installed |
          | `winC2D.exe` | **Self-contained** — includes runtime, no installation needed |

          ### 🚀 Quick Start
          1. Download your preferred version
          2. Run as **Administrator**
          3. Scan → Select software → Migrate

          ### 🌏 Languages
          简体中文 · 繁體中文 · English · 日本語 · 한국어 · Русский · Português (Brasil)

          ---
          [📖 Documentation](https://github.com/Aknirex/winC2D#readme) · [🐛 Report Issue](https://github.com/Aknirex/winC2D/issues)
        files: |
          ./artifacts/winC2D-portable.exe
          ./artifacts/winC2D.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
