name: .NET Desktop Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore winC2D.sln
    
    - name: Build
      run: dotnet build winC2D.sln --configuration Release --no-restore
    
    - name: Run Tests
      run: dotnet test winC2D.sln --configuration Release --no-build --verbosity normal

    # 便携版：单文件 exe，依赖系统已安装的 .NET 8 运行时
    - name: Publish Portable (framework-dependent)
      run: |
        dotnet publish winC2D.App/winC2D.App.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          --output ./publish-portable `
          /p:PublishSingleFile=true `
          /p:SelfContained=false `
          /p:IncludeNativeLibrariesForSelfExtract=false

    # 自包含版：单文件 exe，内含 .NET 运行时，无需额外安装
    - name: Publish Self-Contained
      run: |
        dotnet publish winC2D.App/winC2D.App.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output ./publish-selfcontained `
          /p:PublishSingleFile=true `
          /p:SelfContained=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:EnableCompressionInSingleFile=true

    # 重命名产物，区分两个版本
    - name: Extract version and rename executables
      id: version_rename
      run: |
        # Get version from git tag if exists, otherwise from csproj
        if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
          $version = "${{ github.ref }}".Replace("refs/tags/v", "v")
        } else {
          $version = "dev"
        }
        
        $standaloneFile = "winC2D-$version-standalone.exe"
        $frameworkFile = "winC2D-$version-framework-dependent.exe"
        
        Copy-Item ./publish-selfcontained/winC2D.App.exe $standaloneFile
        Copy-Item ./publish-portable/winC2D.App.exe $frameworkFile
        
        echo "standalone=$standaloneFile" >> $env:GITHUB_OUTPUT
        echo "framework=$frameworkFile" >> $env:GITHUB_OUTPUT
        
        Write-Output "✓ Standalone:   $standaloneFile"
        Write-Output "✓ Framework:    $frameworkFile"

    - name: Compute SHA-256 and verify
      run: |
        $standalone = Get-FileHash "${{ steps.version_rename.outputs.standalone }}" -Algorithm SHA256
        $framework = Get-FileHash "${{ steps.version_rename.outputs.framework }}" -Algorithm SHA256
        
        Write-Output ""
        Write-Output "========== Build Artifacts =========="
        Write-Output "Standalone (with .NET 8 runtime):"
        Write-Output "  File: ${{ steps.version_rename.outputs.standalone }}"
        Write-Output "  SHA256: $($standalone.Hash)"
        Write-Output "  Size: $(([math]::Round($(Get-Item "${{ steps.version_rename.outputs.standalone }}").Length / 1MB, 2))) MB"
        Write-Output ""
        Write-Output "Framework-Dependent (requires .NET 8 runtime):"
        Write-Output "  File: ${{ steps.version_rename.outputs.framework }}"
        Write-Output "  SHA256: $($framework.Hash)"
        Write-Output "  Size: $(([math]::Round($(Get-Item "${{ steps.version_rename.outputs.framework }}").Length / 1MB, 2))) MB"
        Write-Output "======================================"
        
        if ($standalone.Hash -eq $framework.Hash) {
          Write-Error "❌ ERROR: Both files have identical SHA-256 — build configuration is wrong!"
          exit 1
        }
        
        if ($(Get-Item "${{ steps.version_rename.outputs.standalone }}").Length -le $(Get-Item "${{ steps.version_rename.outputs.framework }}").Length) {
          Write-Error "❌ ERROR: Standalone should be larger than framework-dependent!"
          exit 1
        }
        
        Write-Output "✓ Both files are correctly built with different configurations"

    - name: Upload Standalone Artifact
      uses: actions/upload-artifact@v4
      with:
        name: winC2D-standalone
        path: ${{ steps.version_rename.outputs.standalone }}
        retention-days: 7

    - name: Upload Framework-Dependent Artifact
      uses: actions/upload-artifact@v4
      with:
        name: winC2D-framework-dependent
        path: ${{ steps.version_rename.outputs.framework }}
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Download Standalone Artifact
      uses: actions/download-artifact@v4
      with:
        name: winC2D-standalone
        path: ./artifacts

    - name: Download Framework-Dependent Artifact
      uses: actions/download-artifact@v4
      with:
        name: winC2D-framework-dependent
        path: ./artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "winC2D v${{ steps.version.outputs.VERSION }}"
        body: |
          ## winC2D v${{ steps.version.outputs.VERSION }}

          Windows disk migration assistant — move installed software and user folders from C drive to any disk, with symlinks keeping original paths intact.

          ### 📦 Downloads

          | File | Size | Description |
          |------|------|-------------|
          | `winC2D-v${{ steps.version.outputs.VERSION }}-standalone.exe` | ~70–80 MB | ⭐ **Recommended** — includes .NET 8 runtime, no installation needed |
          | `winC2D-v${{ steps.version.outputs.VERSION }}-framework-dependent.exe` | ~10–15 MB | Lightweight — requires [.NET 8 Runtime](https://dotnet.microsoft.com/download/dotnet/8.0) installed |

          ### 🚀 Quick Start
          1. Download **standalone** version (recommended for most users)
          2. Run as **Administrator**
          3. Scan → Select software → Migrate

          ### 🌏 Languages Supported
          简体中文 · 繁體中文 · English · 日本語 · 한국어 · Русский · Português (Brasil)

          ### 📝 Changes in v${{ steps.version.outputs.VERSION }}
          - Fixed GitHub Actions build configuration for two distinct executable versions
          - Improved release artifact naming for clarity
          - Enhanced SHA-256 verification in CI pipeline

          ---
          [📖 Documentation](https://github.com/SKR7lex/winC2D#readme) · [🐛 Report Issue](https://github.com/SKR7lex/winC2D/issues)
        files: |
          ./artifacts/winC2D-v${{ steps.version.outputs.VERSION }}-standalone.exe
          ./artifacts/winC2D-v${{ steps.version.outputs.VERSION }}-framework-dependent.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
