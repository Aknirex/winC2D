name: Build and Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: windows-latest
    env:
      CONFIGURATION: Release
      RID: win-x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"
      - name: Restore dependencies
        run: dotnet restore
      - name: Publish portable single-file build
        run: |
          dotnet publish winC2D.csproj -c ${{ env.CONFIGURATION }} -r ${{ env.RID }} \
            -p:PublishSingleFile=true -p:SelfContained=false -p:PublishTrimmed=false \
            -p:IncludeAllContentForSelfExtract=true -o out/portable
      - name: Publish self-contained single-file build
        run: |
          dotnet publish winC2D.csproj -c ${{ env.CONFIGURATION }} -r ${{ env.RID }} \
            -p:PublishSingleFile=true -p:SelfContained=true \
            -p:IncludeNativeLibrariesForSelfExtract=true -p:TrimUnusedDependencies=true \
            -o out/selfcontained
      - name: Package builds for release
        run: |
          $artifacts = 'artifacts'
          if (Test-Path $artifacts) { Remove-Item $artifacts -Recurse -Force }
          New-Item -ItemType Directory -Path $artifacts | Out-Null
          Compress-Archive -Path 'out/portable/*' -DestinationPath "$artifacts/winc2d-portable.zip" -Force
          Compress-Archive -Path 'out/selfcontained/*' -DestinationPath "$artifacts/winc2d-selfcontained.zip" -Force
      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/winc2d-portable.zip
            artifacts/winc2d-selfcontained.zip
          tag_name: release-${{ github.sha }}
          name: Automated release for ${{ github.sha }}
          body: |
            Portable and self-contained single-file builds for commit ${{ github.sha }}
          draft: false
          prerelease: false
