name: .NET Desktop Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore winC2D.sln
    
    - name: Build
      run: dotnet build winC2D.sln --configuration Release --no-restore
    
    - name: Run Tests
      run: dotnet test winC2D.sln --configuration Release --no-build --verbosity normal

    # Publish as single-file self-contained executables for the installer
    - name: Publish App (single-file, self-contained)
      run: |
        dotnet publish winC2D.App/winC2D.App.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          --output ./publish/app

    - name: Publish CLI (single-file, self-contained)
      run: |
        dotnet publish winC2D.Cli/winC2D.Cli.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          --output ./publish/cli

    # Copy auxiliary files
    - name: Copy auxiliary files
      run: |
        Copy-Item AGENTS.md ./publish/
        Copy-Item README.md ./publish/
        Copy-Item LICENSE ./publish/
        Copy-Item CHANGELOG.md ./publish/
        # Kilo Code skill
        New-Item -ItemType Directory -Force ./publish/winc2d-skill | Out-Null
        Copy-Item installer/winc2d-skill/SKILL.md ./publish/winc2d-skill/SKILL.md

    # Download gsudo for bundling (MIT licensed)
    - name: Download gsudo
      shell: pwsh
      run: |
        $gsudoVersion = "2.5.1"
        $gsudoUrl = "https://github.com/gerardog/gsudo/releases/download/v$gsudoVersion/gsudo.exe"
        Write-Host "Downloading gsudo v$gsudoVersion from $gsudoUrl"
        try {
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          (New-Object System.Net.WebClient).DownloadFile($gsudoUrl, "./publish/gsudo.exe")
          Write-Host "gsudo.exe downloaded successfully ($((Get-Item ./publish/gsudo.exe).Length) bytes)"
        } catch {
          Write-Host "WARNING: gsudo download failed: $_"
          Write-Host "The installer will be built without gsudo. run-elevated.ps1 will auto-install via winget."
        }

    # Install Inno Setup 6 via Chocolatey (most reliable on GitHub runners)
    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup --no-progress -y
        $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6"
        echo "$isccPath" >> $env:GITHUB_PATH

    - name: Extract version and build installer
      id: installer
      shell: pwsh
      run: |
        if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
          $v = "${{ github.ref }}".Replace("refs/tags/v", "")
        } else {
          $v = (Select-String -Path winC2D.App/winC2D.App.csproj -Pattern '<Version>(.*)</Version>' | % { $_.Matches.Groups[1].Value })
        }
        Write-Host "Building installer for version: $v"
        iscc /DAppVersion=$v installer/setup.iss
        $installerFile = Get-ChildItem installer/Output/winC2D-Setup-*.exe | Select-Object -First 1
        $sha = Get-FileHash $installerFile.FullName -Algorithm SHA256
        $sizeMB = [math]::Round($installerFile.Length / 1MB, 1)
        echo "file=$($installerFile.Name)" >> $env:GITHUB_OUTPUT
        echo "sha256=$($sha.Hash)" >> $env:GITHUB_OUTPUT
        echo "size=$sizeMB" >> $env:GITHUB_OUTPUT
        Write-Output "Installer: $($installerFile.Name) ($sizeMB MB)"
        Write-Output "SHA256: $($sha.Hash)"

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: winC2D-Installer
        path: installer/Output/winC2D-Setup-*.exe
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Extract changelog for this version
      id: changelog
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $changelogPath = "CHANGELOG.md"
        
        if (-not (Test-Path $changelogPath)) {
          Write-Warning "CHANGELOG.md not found"
          "content=See CHANGELOG.md for details" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0
        }
        
        $content = Get-Content $changelogPath -Raw
        $lines = $content -split "`n"
        $startIdx = -1
        $endIdx = -1
        
        for ($i = 0; $i -lt $lines.Count; $i++) {
          if ($lines[$i] -match "## \[$version\]") {
            $startIdx = $i + 2
            break
          }
        }
        
        if ($startIdx -eq -1) {
          Write-Warning "Could not find version $version in CHANGELOG.md"
          "content=See CHANGELOG.md for details" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0
        }
        
        for ($i = $startIdx; $i -lt $lines.Count; $i++) {
          if ($lines[$i] -match "^## \[" -or $lines[$i] -match "^---") {
            $endIdx = $i - 1
            break
          }
        }
        
        if ($endIdx -eq -1) {
          $endIdx = $lines.Count - 1
        }
        
        $changelog = ($lines[$startIdx..$endIdx] -join "`n").Trim()
        
        "changelog<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        $changelog | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    
    - name: Download Installer Artifact
      uses: actions/download-artifact@v4
      with:
        name: winC2D-Installer
        path: ./artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "winC2D v${{ steps.version.outputs.VERSION }}"
        body: |
          ## winC2D v${{ steps.version.outputs.VERSION }}

          Windows disk migration assistant — move installed software and user folders from C drive to another disk with symbolic links.

          ### Download

          **Recommended: Installer** — one-click setup to D drive with gsudo elevation and AI agent skill.

          Download and run `winC2D-Setup.exe`:
          - Default install to D drive (does not consume C drive space)
          - Bundles gsudo for elevation
          - Optional AI agent skill installation
          - Clean uninstall via Control Panel

          ### Agent CLI

          After installation, AI agents can run migrations via gsudo:
          ```powershell
          gsudo "D:\Program Files\winC2D\winC2D.Cli.exe" migrate --source "C:\Program Files\App" --target "D:\MigratedApps" --yes
          ```

          ### Languages
          English, 简体中文, 繁體中文, 日本語, 한국어, Русский, Portugues (Brasil)

          ### Changes in v${{ steps.version.outputs.VERSION }}

          ${{ steps.changelog.outputs.changelog }}

          ---
          [Documentation](https://github.com/Aknirex/winC2D#readme) | [Report Issue](https://github.com/Aknirex/winC2D/issues)
        files: |
          ./artifacts/winC2D-Setup-*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
