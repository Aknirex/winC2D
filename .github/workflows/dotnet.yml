name: .NET Desktop Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore winC2D.sln
    
    - name: Build
      run: dotnet build winC2D.sln --configuration Release --no-restore
    
    - name: Run Tests
      run: dotnet test winC2D.sln --configuration Release --no-build --verbosity normal

    # Publish for installer (self-contained, multi-file — Inno Setup needs individual files)
    - name: Publish App (self-contained)
      run: |
        dotnet publish winC2D.App/winC2D.App.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output ./publish/app

    - name: Publish CLI (self-contained)
      run: |
        dotnet publish winC2D.Cli/winC2D.Cli.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output ./publish/cli

    # Copy auxiliary files
    - name: Copy auxiliary files
      run: |
        Copy-Item winC2D.Cli/run-elevated.ps1 ./publish/cli/
        Copy-Item AGENTS.md ./publish/
        Copy-Item README.md ./publish/
        Copy-Item LICENSE ./publish/
        Copy-Item CHANGELOG.md ./publish/
        # Kilo Code skill
        New-Item -ItemType Directory -Force ./publish/winc2d-skill | Out-Null
        Copy-Item installer/winc2d-skill/SKILL.md ./publish/winc2d-skill/SKILL.md

    # Download gsudo for bundling (MIT licensed)
    - name: Download gsudo
      run: |
        # Use specific version URL since /latest/download/ redirect doesn't work in CI
        $gsudoUrl = "https://github.com/gerardog/gsudo/releases/download/v2.5.1/gsudo.exe"
        try {
          Invoke-WebRequest -Uri $gsudoUrl -OutFile ./publish/gsudo.exe -UseBasicParsing
        } catch {
          Write-Host "gsudo download failed, will use winget fallback in run-elevated.ps1"
        }

    # Install Inno Setup 6 via Chocolatey (most reliable on GitHub runners)
    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup --no-progress -y
        $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6"
        echo "$isccPath" >> $env:GITHUB_PATH

    - name: Extract version
      id: version
      run: |
        if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
          $v = "${{ github.ref }}".Replace("refs/tags/v", "")
        } else {
          $v = (Select-String -Path winC2D.App/winC2D.App.csproj -Pattern '<Version>(.*)</Version>' | % { $_.Matches.Groups[1].Value })
        }
        echo "version=$v" >> $env:GITHUB_OUTPUT

    # Build installer
    - name: Build Installer
      id: installer
      run: |
        iscc /DAppVersion=${{ steps.version.outputs.version }} installer/setup.iss
        $installerFile = Get-ChildItem installer/Output/winC2D-Setup-*.exe | Select-Object -First 1
        $sha = Get-FileHash $installerFile.FullName -Algorithm SHA256
        $sizeMB = [math]::Round($installerFile.Length / 1MB, 1)
        echo "file=$($installerFile.Name)" >> $env:GITHUB_OUTPUT
        echo "sha256=$($sha.Hash)" >> $env:GITHUB_OUTPUT
        echo "size=$sizeMB" >> $env:GITHUB_OUTPUT
        Write-Output "Installer: $($installerFile.Name) ($sizeMB MB)"
        Write-Output "SHA256: $($sha.Hash)"

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: winC2D-Installer
        path: installer/Output/winC2D-Setup-*.exe
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Extract changelog for this version
      id: changelog
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $changelogPath = "CHANGELOG.md"
        
        if (-not (Test-Path $changelogPath)) {
          Write-Warning "CHANGELOG.md not found"
          "content=See CHANGELOG.md for details" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0
        }
        
        $content = Get-Content $changelogPath -Raw
        $lines = $content -split "`n"
        $startIdx = -1
        $endIdx = -1
        
        for ($i = 0; $i -lt $lines.Count; $i++) {
          if ($lines[$i] -match "## \[$version\]") {
            $startIdx = $i + 2
            break
          }
        }
        
        if ($startIdx -eq -1) {
          Write-Warning "Could not find version $version in CHANGELOG.md"
          "content=See CHANGELOG.md for details" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0
        }
        
        for ($i = $startIdx; $i -lt $lines.Count; $i++) {
          if ($lines[$i] -match "^## \[" -or $lines[$i] -match "^---") {
            $endIdx = $i - 1
            break
          }
        }
        
        if ($endIdx -eq -1) {
          $endIdx = $lines.Count - 1
        }
        
        $changelog = ($lines[$startIdx..$endIdx] -join "`n").Trim()
        
        "changelog<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        $changelog | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
    
    - name: Download Installer Artifact
      uses: actions/download-artifact@v4
      with:
        name: winC2D-Installer
        path: ./artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "winC2D v${{ steps.version.outputs.VERSION }}"
        body: |
          ## winC2D v${{ steps.version.outputs.VERSION }}

          Windows 磁盘迁移助手 — 将已安装软件和文件夹从 C 盘迁移到其他磁盘，通过符号链接保持原始路径不变。

          ### 📦 下载

          **⭐ 推荐：安装程序** — 一键安装到 D 盘，自动配置 gsudo 提权和 AI agent skill。

          下载并运行 `winC2D-Setup-v${{ steps.version.outputs.VERSION }}.exe`：
          - 默认安装到 D 盘（不占用 C 盘空间）
          - 自动安装 gsudo 提权工具
          - 自动安装 Kilo Code AI agent skill
          - 干净的卸载支持（控制面板 → 程序和功能）

          ### 🤖 Agent CLI

          安装后，AI agent 可以通过 CLI 执行迁移：
          ```powershell
          pwsh -File "C:\Program Files\winC2D\run-elevated.ps1" migrate --source "C:\Program Files\App" --target "D:\MigratedApps" --yes
          ```

          ### 🌏 语言支持
          简体中文 · 繁體中文 · English · 日本語 · 한국어 · Русский · Português (Brasil)

          ### 📝 Changes in v${{ steps.version.outputs.VERSION }}

          ${{ steps.changelog.outputs.changelog }}

          ---
          [📖 文档](https://github.com/Aknirex/winC2D#readme) · [🐛 报告问题](https://github.com/Aknirex/winC2D/issues)
        files: |
          ./artifacts/winC2D-Setup-*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
